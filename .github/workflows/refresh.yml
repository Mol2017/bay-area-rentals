name: Refresh rental data

on:
  schedule:
    # Daily at 13:20 UTC (06:20 PT during PDT, 05:20 PT during PST).
    # Deliberately off the hour: every cron job in the world fires at :00,
    # and an off-minute slot is less likely to collide with a portal's own
    # maintenance window.
    - cron: "20 13 * * *"
  workflow_dispatch: {}

# Only one refresh at a time -- two overlapping runs would race on the
# data commit and one would have to be force-pushed away.
concurrency:
  group: refresh-rental-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The scrapers use only the Python standard library; pytest is the sole
      # dependency and is needed just for the test step.
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parser tests
        run: python -m pytest tests/ -q

      - name: Scrape all sources
        run: python scripts/run_all_scrapers.py

      # Detail-page fields (amenities, room type, summaries) and the
      # parser cross-check. Two modes, decided by whether the repo has an
      # ANTHROPIC_API_KEY secret:
      #
      #   key set    -> full pass. The committed data/enrich_cache.json means
      #                 only genuinely new listings hit the API, so the daily
      #                 cost is a few cents; unchanged listings are free.
      #   key unset  -> --no-llm. Replays the committed cache onto the fresh
      #                 scrape (zero cost, no network to the model) so every
      #                 unchanged listing keeps its enrichment. New listings
      #                 stay bare until a keyed run fills them.
      #
      # Either way enrich_all.py exits 0 on failure, so a dead key or a rate
      # limit degrades detail without ever blocking the merge and deploy.
      - name: Enrich (amenities, summaries, contacts, cross-check)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY present -- full enrichment"
            python scripts/enrich_all.py
          else
            echo "no ANTHROPIC_API_KEY -- replaying committed cache only"
            python scripts/enrich_all.py --no-llm
          fi

      - name: Apply cross-check over the index parser
        run: python scripts/reconcile.py

      - name: Merge into data/merged.json
        run: python scripts/merge.py

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # enrich_cache.json is committed so the next run can replay it;
          # conflicts.json and contacts.json are the enrichment's other
          # outputs. .page_cache.json stays gitignored -- it is scratch.
          git add data/raw/*.json data/merged.json \
                  data/enrich_cache.json data/conflicts.json data/contacts.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "data: refresh rental listings ($(date -u +%Y-%m-%d))"
            git push
          fi

  # Publish the static site from the refreshed data.
  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          # The refresh job just pushed; make sure we publish that commit.
          ref: ${{ github.ref }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
